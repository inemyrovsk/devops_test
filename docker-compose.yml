version: "3.9"
services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:5000"
    depends_on:
      - worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    expose:
      - "5001"
    volumes:
      - ./logs/worker:/home/appuser/code/logs
